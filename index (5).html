<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Meister · A2 → B1</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇩🇪</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #232736; --border: #2e3348;
      --gold: #f0c040; --gold2: #e8a020; --text: #e8eaf0; --muted: #7a8099;
      --green: #4caf78; --red: #e05555; --blue: #5b8dee;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    .app {
      min-height: 100vh; background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 0%, rgba(240,192,64,0.07) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, rgba(91,141,238,0.06) 0%, transparent 60%);
    }
    .header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-flag { font-size: 2rem; }
    .logo-text h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); letter-spacing: -0.02em; }
    .logo-text p { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .header-badge { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #1a1200; font-weight: 700; font-size: 0.75rem; padding: 6px 14px; border-radius: 20px; letter-spacing: 0.05em; }
    .level-bar { padding: 20px 32px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--border); }
    .level-btn { flex-shrink: 0; padding: 8px 20px; border-radius: 24px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .level-btn:hover { border-color: var(--gold); color: var(--gold); }
    .level-btn.active { background: var(--gold); color: #1a1200; border-color: var(--gold); font-weight: 700; }
    .main { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 120px); }
    .sidebar { border-right: 1px solid var(--border); padding: 28px 24px; }
    .sidebar-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; }
    .topic-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
    .topic-level { font-size: 0.7rem; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .topic-name { font-size: 1rem; font-weight: 600; margin: 6px 0 4px; color: var(--text); }
    .topic-grammar { font-size: 0.8rem; color: var(--muted); }
    .day-control { margin-top: 20px; }
    .day-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
    .day-row { display: flex; align-items: center; gap: 10px; }
    .day-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .day-btn:hover { border-color: var(--gold); color: var(--gold); }
    .day-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); font-weight: 900; min-width: 40px; text-align: center; }
    .progress-section { margin-top: 24px; }
    .progress-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 3px; transition: width 0.4s ease; }
    .progress-text { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
    .gen-btn { width: 100%; margin-top: 24px; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #1a1200; font-weight: 700; font-size: 0.95rem; border: none; border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; letter-spacing: 0.02em; }
    .gen-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(240,192,64,0.3); }
    .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* API KEY */
    .apikey-banner { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.25); border-radius: 12px; padding: 14px 16px; margin-top: 16px; }
    .apikey-banner label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); display: block; margin-bottom: 7px; }
    .apikey-input { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 9px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; outline: none; }
    .apikey-input:focus { border-color: var(--gold); }
    .apikey-hint { font-size: 0.7rem; color: var(--muted); margin-top: 6px; line-height: 1.4; }

    .content { padding: 28px 32px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; color: var(--muted); }
    .empty-icon { font-size: 4rem; opacity: 0.4; }
    .empty-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
    .empty-sub { font-size: 0.9rem; text-align: center; max-width: 300px; line-height: 1.6; }
    .loading-lesson { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
    .loading-icon { font-size: 3.5rem; animation: pulse 1.5s ease-in-out infinite; }
    .loading-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); }
    .loading-sub { font-size: 0.85rem; color: var(--muted); }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
    .lesson-header { margin-bottom: 28px; }
    .lesson-title { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 900; color: var(--text); line-height: 1.2; }
    .lesson-meta { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .lesson-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .tag-level { background: rgba(240,192,64,0.15); color: var(--gold); border: 1px solid rgba(240,192,64,0.3); }
    .tag-day { background: rgba(91,141,238,0.15); color: var(--blue); border: 1px solid rgba(91,141,238,0.3); }
    .tag-done { background: rgba(76,175,120,0.15); color: var(--green); border: 1px solid rgba(76,175,120,0.3); }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); padding: 6px; border-radius: 14px; width: fit-content; flex-wrap: wrap; }
    .tab-btn { padding: 8px 20px; border-radius: 10px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .text-block { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .text-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .text-block-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); font-weight: 600; }
    .german-text { font-size: 1.05rem; line-height: 1.85; color: var(--text); }
    .translation-text { font-size: 0.9rem; line-height: 1.75; color: var(--muted); font-style: italic; }
    .text-title-de { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--text); margin-bottom: 14px; }
    .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .vocab-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .vocab-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .vocab-front, .vocab-back { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .vocab-card.flipped .vocab-front { display: none; }
    .vocab-card:not(.flipped) .vocab-back { display: none; }
    .vocab-word { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold); }
    .vocab-hint { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
    .vocab-translation { font-size: 1.1rem; font-weight: 600; color: var(--green); }
    .vocab-example { font-size: 0.78rem; color: var(--muted); font-style: italic; display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
    .grammar-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .grammar-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); margin-bottom: 12px; }
    .grammar-explanation { font-size: 0.9rem; line-height: 1.75; color: var(--text); margin-bottom: 16px; }
    .rules-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .rules-list li { display: flex; gap: 10px; align-items: flex-start; font-size: 0.88rem; line-height: 1.6; }
    .rules-list li::before { content: "→"; color: var(--gold); flex-shrink: 0; margin-top: 1px; }
    .examples-list { display: flex; flex-direction: column; gap: 10px; }
    .example-row { background: var(--surface2); border-radius: 10px; padding: 12px 16px; }
    .example-de { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .example-es { font-size: 0.83rem; color: var(--muted); margin-top: 4px; }
    .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; margin-top: 16px; }
    .exercise-section { display: flex; flex-direction: column; gap: 16px; }
    .exercise-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; transition: border-color 0.2s; }
    .exercise-item.correct { border-color: var(--green); background: rgba(76,175,120,0.05); }
    .exercise-item.wrong { border-color: var(--red); background: rgba(224,85,85,0.05); }
    .exercise-question { font-size: 0.95rem; font-weight: 500; margin-bottom: 12px; line-height: 1.5; }
    .ex-num { color: var(--gold); font-weight: 700; margin-right: 6px; }
    .ex-options { display: flex; flex-direction: column; gap: 8px; }
    .ex-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer; font-size: 0.88rem; transition: all 0.2s; }
    .ex-option input { display: none; }
    .ex-option.selected { border-color: var(--blue); background: rgba(91,141,238,0.1); color: var(--blue); }
    .ex-option:hover { border-color: var(--muted); }
    .ex-input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .ex-input:focus { border-color: var(--gold); }
    .ex-feedback { margin-top: 10px; font-size: 0.85rem; font-weight: 600; }
    .correct .ex-feedback { color: var(--green); }
    .wrong .ex-feedback { color: var(--red); }
    .check-btn { padding: 13px 28px; background: linear-gradient(135deg, var(--blue), #3a6fd8); color: white; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; align-self: flex-start; transition: all 0.2s; }
    .check-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(91,141,238,0.35); }
    .score-display { font-size: 1rem; font-weight: 600; color: var(--text); }
    .perfect { color: var(--green); }
    .tip-card { background: linear-gradient(135deg, rgba(240,192,64,0.08), rgba(240,192,64,0.03)); border: 1px solid rgba(240,192,64,0.2); border-radius: 14px; padding: 18px 20px; margin-top: 24px; display: flex; gap: 12px; align-items: flex-start; }
    .tip-icon { font-size: 1.3rem; flex-shrink: 0; }
    .tip-text { font-size: 0.88rem; line-height: 1.65; color: var(--text); }
    .speak-btn { background: rgba(240,192,64,0.1); border: 1px solid rgba(240,192,64,0.25); color: var(--gold); border-radius: 8px; padding: 4px 10px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
    .speak-btn:hover, .speak-btn.speaking { background: rgba(240,192,64,0.2); }
    .error-card { background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.3); border-radius: 14px; padding: 20px; color: var(--red); }
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .content { padding: 20px 18px; }
      .header { padding: 18px; }
      .level-bar { padding: 14px 18px; }
      .vocab-grid { grid-template-columns: 1fr 1fr; }
      .tabs { width: 100%; }
      .tab-btn { padding: 7px 12px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const LEVELS = ["A2.1", "A2.2", "A2.3", "B1.1", "B1.2", "B1.3"];
    const LESSON_TOPICS = [
      { level: "A2.1", topic: "Alltag & Routine", grammar: "Trennbare Verben", vocab_theme: "Tagesablauf" },
      { level: "A2.2", topic: "Einkaufen & Essen", grammar: "Akkusativ mit Adjektiven", vocab_theme: "Lebensmittel & Geschäfte" },
      { level: "A2.3", topic: "Reisen & Verkehr", grammar: "Modalverben (Vergangenheit)", vocab_theme: "Transport & Reise" },
      { level: "B1.1", topic: "Arbeit & Beruf", grammar: "Relativsätze", vocab_theme: "Berufe & Arbeitsalltag" },
      { level: "B1.2", topic: "Gesundheit & Körper", grammar: "Konjunktiv II", vocab_theme: "Gesundheit & Medizin" },
      { level: "B1.3", topic: "Gesellschaft & Meinung", grammar: "Passiv", vocab_theme: "Gesellschaft & Politik" },
    ];

    const SYSTEM_PROMPT = `Eres un experto profesor de alemán preparando a un estudiante español para el examen B1 de la EOI. El estudiante está en nivel A2 y tiene urgencia por alcanzar B1. Genera lecciones estructuradas, claras y motivadoras. Siempre en español excepto el contenido en alemán. Responde SOLO en JSON válido sin markdown ni backticks.`;

    function SpeakButton({ text, label = "🔊" }) {
      const [speaking, setSpeaking] = useState(false);
      const handle = () => {
        if (speaking) { window.speechSynthesis.cancel(); setSpeaking(false); return; }
        setSpeaking(true);
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "de-DE"; utter.rate = 0.85;
        const voices = window.speechSynthesis.getVoices();
        const g = voices.find(v => v.lang.startsWith("de"));
        if (g) utter.voice = g;
        utter.onend = () => setSpeaking(false);
        utter.onerror = () => setSpeaking(false);
        window.speechSynthesis.speak(utter);
      };
      return (
        <button onClick={handle} className={`speak-btn ${speaking ? "speaking" : ""}`} title="Escuchar">
          {speaking ? "⏹" : label}
        </button>
      );
    }

    function LoadingLesson() {
      const [dots, setDots] = useState(0);
      useEffect(() => {
        const t = setInterval(() => setDots(d => (d + 1) % 4), 400);
        return () => clearInterval(t);
      }, []);
      return (
        <div className="loading-lesson">
          <div className="loading-icon">🇩🇪</div>
          <div className="loading-text">Generando tu lección{".".repeat(dots)}</div>
          <div className="loading-sub">La IA está preparando contenido personalizado</div>
        </div>
      );
    }

    function VocabCard({ word, translation, example }) {
      const [flipped, setFlipped] = useState(false);
      return (
        <div className={`vocab-card ${flipped ? "flipped" : ""}`} onClick={() => setFlipped(!flipped)}>
          <div className="vocab-front">
            <div className="vocab-word">{word}</div>
            <SpeakButton text={word} />
            <div className="vocab-hint">Toca para ver traducción</div>
          </div>
          <div className="vocab-back">
            <div className="vocab-translation">{translation}</div>
            {example && <div className="vocab-example">„{example}" <SpeakButton text={example} /></div>}
          </div>
        </div>
      );
    }

    function ExerciseSection({ exercises, onComplete }) {
      const [answers, setAnswers] = useState({});
      const [checked, setChecked] = useState(false);
      const [score, setScore] = useState(0);
      const check = () => {
        let correct = 0;
        exercises.forEach((ex, i) => {
          if ((answers[i] || "").trim().toLowerCase() === ex.answer.toLowerCase()) correct++;
        });
        setScore(correct);
        setChecked(true);
        if (correct === exercises.length) onComplete && onComplete();
      };
      return (
        <div className="exercise-section">
          {exercises.map((ex, i) => (
            <div key={i} className={`exercise-item ${checked ? (( answers[i] || "").trim().toLowerCase() === ex.answer.toLowerCase() ? "correct" : "wrong") : ""}`}>
              <div className="exercise-question"><span className="ex-num">{i + 1}.</span> {ex.question}</div>
              {ex.type === "multiple" ? (
                <div className="ex-options">
                  {ex.options.map(opt => (
                    <label key={opt} className={`ex-option ${answers[i] === opt ? "selected" : ""}`}>
                      <input type="radio" name={`q${i}`} value={opt} onChange={() => setAnswers(a => ({ ...a, [i]: opt }))} disabled={checked} />
                      {opt}
                    </label>
                  ))}
                </div>
              ) : (
                <input className="ex-input" type="text" placeholder="Tu respuesta..."
                  value={answers[i] || ""} disabled={checked}
                  onChange={e => setAnswers(a => ({ ...a, [i]: e.target.value }))} />
              )}
              {checked && (
                <div className="ex-feedback">
                  {(answers[i] || "").trim().toLowerCase() === ex.answer.toLowerCase()
                    ? "✓ ¡Correcto!" : `✗ Respuesta correcta: ${ex.answer}`}
                </div>
              )}
            </div>
          ))}
          {!checked
            ? <button className="check-btn" onClick={check}>Comprobar respuestas</button>
            : <div className="score-display">{score}/{exercises.length} correctas {score === exercises.length && <span className="perfect">🎉 ¡Perfecto!</span>}</div>
          }
        </div>
      );
    }

    function App() {
      const [currentLevel, setCurrentLevel] = useState(0);
      const [lessonDay, setLessonDay] = useState(1);
      const [lesson, setLesson] = useState(null);
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState("texto");
      const [exercisesDone, setExercisesDone] = useState(false);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("deutsch_apikey") || "");
      const [progress, setProgress] = useState(() => {
        try { return JSON.parse(localStorage.getItem("deutsch_progress") || "{}"); } catch { return {}; }
      });

      const levelInfo = LESSON_TOPICS[currentLevel];
      const completedDays = Object.keys(progress).filter(k => k.startsWith(levelInfo.level)).length;

      const saveApiKey = (key) => {
        setApiKey(key);
        localStorage.setItem("deutsch_apikey", key);
      };

      const saveProgress = (key, val) => {
        const p = { ...progress, [key]: val };
        setProgress(p);
        try { localStorage.setItem("deutsch_progress", JSON.stringify(p)); } catch {}
      };

      const generateLesson = async () => {
        if (!apiKey.trim()) { alert("Por favor introduce tu API Key de Anthropic primero."); return; }
        setLoading(true); setLesson(null); setActiveTab("texto"); setExercisesDone(false);
        const prompt = `Genera una lección de alemán con estos parámetros:
- Nivel: ${levelInfo.level}
- Día: ${lessonDay}
- Tema: ${levelInfo.topic}
- Gramática: ${levelInfo.grammar}
- Vocabulario: ${levelInfo.vocab_theme}

Devuelve EXACTAMENTE este JSON (sin markdown, sin backticks):
{
  "titulo": "título de la lección",
  "texto": {
    "titulo": "título del texto",
    "contenido": "texto en alemán de 8-10 oraciones sobre el tema, nivel ${levelInfo.level}",
    "traduccion": "traducción completa al español"
  },
  "vocabulario": [
    {"word": "palabra alemana", "translation": "traducción española", "example": "oración de ejemplo en alemán"},
    {"word": "...", "translation": "...", "example": "..."},
    {"word": "...", "translation": "...", "example": "..."},
    {"word": "...", "translation": "...", "example": "..."},
    {"word": "...", "translation": "...", "example": "..."},
    {"word": "...", "translation": "...", "example": "..."}
  ],
  "gramatica": {
    "titulo": "título explicación gramática",
    "explicacion": "explicación clara en español de ${levelInfo.grammar}",
    "reglas": ["regla 1", "regla 2", "regla 3"],
    "ejemplos": [
      {"de": "frase en alemán", "es": "traducción"},
      {"de": "frase en alemán", "es": "traducción"},
      {"de": "frase en alemán", "es": "traducción"}
    ]
  },
  "ejercicios": [
    {"type": "fill", "question": "Completa la frase: ...", "answer": "respuesta"},
    {"type": "multiple", "question": "¿Cuál es la forma correcta?", "options": ["A", "B", "C", "D"], "answer": "la correcta"},
    {"type": "fill", "question": "Traduce al alemán: '...'", "answer": "traducción"},
    {"type": "multiple", "question": "Elige la opción correcta:", "options": ["A", "B", "C", "D"], "answer": "la correcta"},
    {"type": "fill", "question": "Completa con la forma correcta: ...", "answer": "respuesta"}
  ],
  "consejo": "consejo motivador específico para EOI B1"
}`;
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
            body: JSON.stringify({ model: "claude-sonnet-4-5-20250514", max_tokens: 2000, system: SYSTEM_PROMPT, messages: [{ role: "user", content: prompt }] })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const raw = data.content.map(b => b.text || "").join("");
          const clean = raw.replace(/```json|```/g, "").trim();
          const jsonMatch = clean.match(/\{[\s\S]*\}/);
          const parsed = JSON.parse(jsonMatch ? jsonMatch[0] : clean);
          setLesson(parsed);
          saveProgress(`${levelInfo.level}_day${lessonDay}`, true);
        } catch (e) {
          setLesson({ error: `Error: ${e.message || "Inténtalo de nuevo."}` });
        }
        setLoading(false);
      };

      return (
        <div className="app">
          <header className="header">
            <div className="logo">
              <div className="logo-flag">🇩🇪</div>
              <div className="logo-text">
                <h1>Deutsch Meister</h1>
                <p>Camino al B1 · EOI</p>
              </div>
            </div>
            <div className="header-badge">A2 → B1</div>
          </header>

          <div className="level-bar">
            {LEVELS.map((lv, i) => (
              <button key={lv} className={`level-btn ${currentLevel === i ? "active" : ""}`}
                onClick={() => { setCurrentLevel(i); setLesson(null); setLessonDay(1); }}>
                {lv}
              </button>
            ))}
          </div>

          <div className="main">
            <aside className="sidebar">
              <div className="sidebar-title">Lección actual</div>
              <div className="topic-card">
                <div className="topic-level">{levelInfo.level}</div>
                <div className="topic-name">{levelInfo.topic}</div>
                <div className="topic-grammar">📐 {levelInfo.grammar}</div>
              </div>

              <div className="day-control">
                <div className="day-label">Día de estudio</div>
                <div className="day-row">
                  <button className="day-btn" onClick={() => setLessonDay(d => Math.max(1, d - 1))}>−</button>
                  <div className="day-num">{lessonDay}</div>
                  <button className="day-btn" onClick={() => setLessonDay(d => d + 1)}>+</button>
                </div>
              </div>

              <div className="progress-section">
                <div className="sidebar-title" style={{marginBottom: "6px"}}>Progreso en {levelInfo.level}</div>
                <div className="progress-bar-bg">
                  <div className="progress-bar-fill" style={{width: `${Math.min(100, (completedDays / 10) * 100)}%`}} />
                </div>
                <div className="progress-text">{completedDays} lección{completedDays !== 1 ? "es" : ""} completada{completedDays !== 1 ? "s" : ""}</div>
              </div>

              <div className="apikey-banner">
                <label>🔑 API Key de Anthropic</label>
                <input className="apikey-input" type="password" placeholder="sk-ant-..." value={apiKey} onChange={e => saveApiKey(e.target.value)} />
                <div className="apikey-hint">Se guarda solo en tu navegador. Consíguela en <strong>console.anthropic.com</strong></div>
              </div>

              <button className="gen-btn" onClick={generateLesson} disabled={loading}>
                {loading ? "Generando..." : "✨ Generar lección"}
              </button>
            </aside>

            <main className="content">
              {loading && <LoadingLesson />}

              {!loading && !lesson && (
                <div className="empty-state">
                  <div className="empty-icon">📖</div>
                  <div className="empty-title">¡Bereit zu lernen!</div>
                  <div className="empty-sub">Introduce tu API Key, elige tu nivel y pulsa "Generar lección" para empezar.</div>
                </div>
              )}

              {!loading && lesson && lesson.error && <div className="error-card">⚠️ {lesson.error}</div>}

              {!loading && lesson && !lesson.error && (
                <>
                  <div className="lesson-header">
                    <div className="lesson-title">{lesson.titulo}</div>
                    <div className="lesson-meta">
                      <span className="lesson-tag tag-level">{levelInfo.level}</span>
                      <span className="lesson-tag tag-day">Día {lessonDay}</span>
                      {exercisesDone && <span className="lesson-tag tag-done">✓ Completada</span>}
                    </div>
                  </div>

                  <div className="tabs">
                    {[["texto","📄 Texto"],["vocabulario","📚 Vocabulario"],["gramatica","📐 Gramática"],["ejercicios","✏️ Ejercicios"]].map(([id, label]) => (
                      <button key={id} className={`tab-btn ${activeTab === id ? "active" : ""}`} onClick={() => setActiveTab(id)}>{label}</button>
                    ))}
                  </div>

                  {activeTab === "texto" && lesson.texto && (
                    <>
                      <div className="text-block">
                        <div className="text-block-header">
                          <div className="text-block-title">🇩🇪 Texto en alemán</div>
                          <SpeakButton text={lesson.texto.contenido} label="🔊 Escuchar" />
                        </div>
                        <div className="text-title-de">{lesson.texto.titulo}</div>
                        <div className="german-text">{lesson.texto.contenido}</div>
                      </div>
                      <div className="text-block">
                        <div className="text-block-title" style={{marginBottom:"12px"}}>🇪🇸 Traducción</div>
                        <div className="translation-text">{lesson.texto.traduccion}</div>
                      </div>
                      {lesson.consejo && (
                        <div className="tip-card">
                          <div className="tip-icon">💡</div>
                          <div className="tip-text"><strong>Consejo EOI:</strong> {lesson.consejo}</div>
                        </div>
                      )}
                    </>
                  )}

                  {activeTab === "vocabulario" && lesson.vocabulario && (
                    <>
                      <div style={{fontSize:"0.85rem", color:"var(--muted)", marginBottom:"18px"}}>Toca las tarjetas para ver la traducción y el ejemplo</div>
                      <div className="vocab-grid">
                        {lesson.vocabulario.map((v, i) => <VocabCard key={i} word={v.word} translation={v.translation} example={v.example} />)}
                      </div>
                    </>
                  )}

                  {activeTab === "gramatica" && lesson.gramatica && (
                    <div className="grammar-card">
                      <div className="grammar-title">{lesson.gramatica.titulo}</div>
                      <div className="grammar-explanation">{lesson.gramatica.explicacion}</div>
                      <div className="section-label">Reglas clave</div>
                      <ul className="rules-list">{lesson.gramatica.reglas && lesson.gramatica.reglas.map((r, i) => <li key={i}>{r}</li>)}</ul>
                      <div className="section-label">Ejemplos</div>
                      <div className="examples-list">
                        {lesson.gramatica.ejemplos && lesson.gramatica.ejemplos.map((e, i) => (
                          <div key={i} className="example-row">
                            <div className="example-de">{e.de} <SpeakButton text={e.de} /></div>
                            <div className="example-es">{e.es}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === "ejercicios" && lesson.ejercicios && (
                    <ExerciseSection exercises={lesson.ejercicios} onComplete={() => setExercisesDone(true)} />
                  )}
                </>
              )}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
